<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D contribution graph placeholder</title>
  <desc id="desc">A polished placeholder for the GitHub Actions generated 3D contribution graph.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#11352F"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#15803D"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <style>
      .title { font: 800 42px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .text { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #C8D7EA; }
      .cube { animation: breathe 4s ease-in-out infinite; transform-origin: bottom; }
      .d1 { animation-delay: .1s; } .d2 { animation-delay: .3s; } .d3 { animation-delay: .5s; }
      .d4 { animation-delay: .7s; } .d5 { animation-delay: .9s; }
      @keyframes breathe { 0%,100% { transform: translateY(0); opacity: .85; } 50% { transform: translateY(-10px); opacity: 1; } }
    </style>
  </defs>
  <rect width="1200" height="680" rx="30" fill="url(#bg)"/>
  <text class="title" x="64" y="78">3D Contribution Graph</text>
  <text class="text" x="66" y="112">GitHub Actions will replace this placeholder with a real generated contribution model.</text>
  <g transform="translate(118 538)" filter="url(#shadow)">
    <g class="cube d1"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -34 L0 -54 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -34 L84 -54 Z" fill="url(#side)"/></g>
    <g class="cube d2" transform="translate(100 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -92 L0 -112 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -92 L84 -112 Z" fill="url(#side)"/></g>
    <g class="cube d3" transform="translate(200 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -142 L0 -162 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -142 L84 -162 Z" fill="url(#side)"/></g>
    <g class="cube d4" transform="translate(300 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -72 L0 -92 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -72 L84 -92 Z" fill="url(#side)"/></g>
    <g class="cube d5" transform="translate(400 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -205 L0 -225 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -205 L84 -225 Z" fill="url(#side)"/></g>
    <g class="cube d2" transform="translate(500 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -124 L0 -144 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -124 L84 -144 Z" fill="url(#side)"/></g>
    <g class="cube d4" transform="translate(600 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -172 L0 -192 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -172 L84 -192 Z" fill="url(#side)"/></g>
    <g class="cube d1" transform="translate(700 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -86 L0 -106 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -86 L84 -106 Z" fill="url(#side)"/></g>
    <g class="cube d3" transform="translate(800 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -232 L0 -252 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -232 L84 -252 Z" fill="url(#side)"/></g>
    <g class="cube d5" transform="translate(900 0)"><path d="M0 0 L42 -20 L84 0 L42 20 Z" fill="url(#top)"/><path d="M0 0 L42 20 L42 -112 L0 -132 Z" fill="#166534"/><path d="M84 0 L42 20 L42 -112 L84 -132 Z" fill="url(#side)"/></g>
  </g>
</svg>
