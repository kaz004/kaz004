<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Technology stack galaxy</title>
  <desc id="desc">A visual map of frontend, backend, database, DevOps, and developer tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#10233F"/>
      <stop offset="1" stop-color="#062D2B"/>
    </linearGradient>
    <linearGradient id="line" x1="90" y1="205" x2="1100" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset=".5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <style>
      .title { font: 900 34px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .sub { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #BFD0E4; }
      .node { font: 800 15px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .small { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #AFC2D8; }
      .orbit { stroke-dasharray: 7 12; animation: move 16s linear infinite; }
      .float { animation: float 6.5s ease-in-out infinite; }
      .float2 { animation: float 7.5s ease-in-out infinite reverse; }
      @keyframes move { to { stroke-dashoffset: -380; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
  </defs>
  <rect width="1200" height="260" rx="24" fill="url(#bg)"/>
  <path class="orbit" d="M92 197C230 70 356 222 516 116C676 10 850 190 1102 58" stroke="url(#line)" stroke-width="2.4" opacity=".82"/>
  <text class="title" x="54" y="58">Tech Stack Map</text>
  <text class="sub" x="56" y="88">A wider toolkit across web apps, APIs, automation, containers, deployment, and practical project delivery.</text>

  <g filter="url(#shadow)">
    <g class="float" transform="translate(78 128)">
      <rect width="180" height="82" rx="18" fill="#FFFFFF" fill-opacity=".105" stroke="#38BDF8" stroke-opacity=".45"/>
      <text class="node" x="24" y="33">Frontend</text>
      <text class="small" x="24" y="58">React, Next, Tailwind</text>
    </g>
    <g class="float2" transform="translate(286 106)">
      <rect width="180" height="82" rx="18" fill="#FFFFFF" fill-opacity=".105" stroke="#22C55E" stroke-opacity=".45"/>
      <text class="node" x="24" y="33">Backend</text>
      <text class="small" x="24" y="58">Node, Express, APIs</text>
    </g>
    <g class="float" transform="translate(494 128)">
      <rect width="180" height="82" rx="18" fill="#FFFFFF" fill-opacity=".105" stroke="#F59E0B" stroke-opacity=".45"/>
      <text class="node" x="24" y="33">Databases</text>
      <text class="small" x="24" y="58">MongoDB, MySQL</text>
    </g>
    <g class="float2" transform="translate(702 106)">
      <rect width="180" height="82" rx="18" fill="#FFFFFF" fill-opacity=".105" stroke="#38BDF8" stroke-opacity=".45"/>
      <text class="node" x="24" y="33">DevOps</text>
      <text class="small" x="24" y="58">Docker, K8s, Jenkins</text>
    </g>
    <g class="float" transform="translate(910 128)">
      <rect width="210" height="82" rx="18" fill="#FFFFFF" fill-opacity=".105" stroke="#22C55E" stroke-opacity=".45"/>
      <text class="node" x="24" y="33">Workflow</text>
      <text class="small" x="24" y="58">Git, Linux, Postman, VS Code</text>
    </g>
  </g>
</svg>
