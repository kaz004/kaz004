<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Technology matrix</title>
  <desc id="desc">A bright professional technology stack matrix.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset=".52" stop-color="#EEF7FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#155EEF"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16A34A"/><stop offset="1" stop-color="#86EFAC"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/><stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity=".14"/>
    </filter>
    <style>
      .title { font: 900 38px 'Segoe UI', Arial, sans-serif; fill: #10233F; }
      .sub { font: 560 16px 'Segoe UI', Arial, sans-serif; fill: #526175; }
      .head { font: 900 16px 'Segoe UI', Arial, sans-serif; fill: #10233F; }
      .item { font: 750 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .float { animation: float 7s ease-in-out infinite; }
      .float2 { animation: float 8s ease-in-out infinite reverse; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes pulse { 0%,100% { opacity:.7; transform:scale(.95); } 50% { opacity:1; transform:scale(1.06); } }
    </style>
  </defs>
  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <text class="title" x="58" y="64">Technology Stack</text>
  <text class="sub" x="60" y="94">A clear view of the tools used across interfaces, APIs, data, automation, and delivery.</text>

  <g filter="url(#shadow)">
    <g class="float" transform="translate(58 130)">
      <rect width="248" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2EE"/>
      <circle class="pulse" cx="38" cy="38" r="14" fill="url(#blue)"/>
      <text class="head" x="64" y="43">Frontend</text>
      <text class="item" x="30" y="82">React</text><text class="item" x="92" y="82">Next.js</text><text class="item" x="170" y="82">Vite</text>
      <text class="item" x="30" y="116">Tailwind</text><text class="item" x="122" y="116">Bootstrap</text>
    </g>
    <g class="float2" transform="translate(336 130)">
      <rect width="248" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2EE"/>
      <circle class="pulse" cx="38" cy="38" r="14" fill="url(#green)"/>
      <text class="head" x="64" y="43">Backend</text>
      <text class="item" x="30" y="82">Node.js</text><text class="item" x="108" y="82">Express</text><text class="item" x="188" y="82">JWT</text>
      <text class="item" x="30" y="116">REST APIs</text><text class="item" x="132" y="116">Auth</text>
    </g>
    <g class="float" transform="translate(614 130)">
      <rect width="248" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2EE"/>
      <circle class="pulse" cx="38" cy="38" r="14" fill="url(#amber)"/>
      <text class="head" x="64" y="43">Data</text>
      <text class="item" x="30" y="82">MongoDB</text><text class="item" x="126" y="82">MySQL</text>
      <text class="item" x="30" y="116">Schemas</text><text class="item" x="120" y="116">Queries</text>
    </g>
    <g class="float2" transform="translate(892 130)">
      <rect width="248" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2EE"/>
      <circle class="pulse" cx="38" cy="38" r="14" fill="url(#blue)"/>
      <text class="head" x="64" y="43">DevOps</text>
      <text class="item" x="30" y="82">Docker</text><text class="item" x="104" y="82">Kubernetes</text>
      <text class="item" x="30" y="116">Jenkins</text><text class="item" x="108" y="116">Terraform</text>
    </g>
  </g>
</svg>
