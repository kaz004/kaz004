<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contribution activity skyline</title>
  <desc id="desc">Animated contribution activity graphic inspired by a 3D skyline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0D2B2A"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="360" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14532D"/>
      <stop offset="0.55" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="floor" width="44" height="44" patternUnits="userSpaceOnUse" patternTransform="skewX(-28)">
      <path d="M0 44 L44 44 M44 0 L44 44" stroke="#FFFFFF" stroke-opacity="0.06"/>
    </pattern>
    <style>
      .bar { animation: rise 3.8s ease-in-out infinite; transform-origin: bottom; }
      .b2 { animation-delay: .2s; } .b3 { animation-delay: .4s; } .b4 { animation-delay: .6s; }
      .b5 { animation-delay: .8s; } .b6 { animation-delay: 1s; } .b7 { animation-delay: 1.2s; }
      .title { font: 800 36px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .text { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #BFD0E3; }
      @keyframes rise { 0%,100% { transform: scaleY(.86); opacity: .82; } 50% { transform: scaleY(1); opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text class="title" x="54" y="72">Contribution Activity</text>
  <text class="text" x="56" y="104">A visual layer for daily building, commits, and project momentum.</text>
  <path d="M54 300 L1125 300 L1010 350 L0 350 Z" fill="url(#floor)"/>

  <g transform="translate(116 296)" filter="url(#shadow)">
    <g class="bar b2"><path d="M0 0 L38 -14 L76 0 L76 -68 L38 -84 L0 -68 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -52 L76 -68 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b4" transform="translate(92 0)"><path d="M0 0 L38 -14 L76 0 L76 -130 L38 -146 L0 -130 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -114 L76 -130 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b3" transform="translate(184 0)"><path d="M0 0 L38 -14 L76 0 L76 -92 L38 -108 L0 -92 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -76 L76 -92 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b6" transform="translate(276 0)"><path d="M0 0 L38 -14 L76 0 L76 -170 L38 -186 L0 -170 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -154 L76 -170 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b5" transform="translate(368 0)"><path d="M0 0 L38 -14 L76 0 L76 -118 L38 -134 L0 -118 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -102 L76 -118 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b7" transform="translate(460 0)"><path d="M0 0 L38 -14 L76 0 L76 -205 L38 -221 L0 -205 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -189 L76 -205 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b2" transform="translate(552 0)"><path d="M0 0 L38 -14 L76 0 L76 -80 L38 -96 L0 -80 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -64 L76 -80 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b4" transform="translate(644 0)"><path d="M0 0 L38 -14 L76 0 L76 -150 L38 -166 L0 -150 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -134 L76 -150 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b3" transform="translate(736 0)"><path d="M0 0 L38 -14 L76 0 L76 -108 L38 -124 L0 -108 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -92 L76 -108 Z" fill="#0F766E" opacity=".72"/></g>
    <g class="bar b6" transform="translate(828 0)"><path d="M0 0 L38 -14 L76 0 L76 -188 L38 -204 L0 -188 Z" fill="url(#bar)"/><path d="M76 0 L38 16 L38 -172 L76 -188 Z" fill="#0F766E" opacity=".72"/></g>
  </g>
</svg>
