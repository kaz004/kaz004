<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kavyansh Singh portfolio hero</title>
  <desc id="desc">A clean professional portfolio hero with full-stack and DevOps themed abstract visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06101F"/>
      <stop offset=".48" stop-color="#0E243E"/>
      <stop offset="1" stop-color="#062D2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="330" x2="1120" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset=".52" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop stop-color="#38BDF8" stop-opacity=".38"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity=".32"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity=".045"/>
    </pattern>
    <style>
      .name { font: 900 62px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .role { font: 650 23px 'Segoe UI', Arial, sans-serif; fill: #C9DAEE; }
      .body { font: 520 17px 'Segoe UI', Arial, sans-serif; fill: #AFC2D8; }
      .pill { font: 850 14px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; letter-spacing: .7px; }
      .label { font: 850 16px 'Segoe UI', Arial, sans-serif; fill: #EAF7FF; }
      .small { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #BFD0E4; }
      .route { stroke-dasharray: 10 15; animation: route 17s linear infinite; }
      .float { animation: float 7s ease-in-out infinite; }
      .float2 { animation: float 8s ease-in-out infinite reverse; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      @keyframes route { to { stroke-dashoffset: -520; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
      @keyframes pulse { 0%,100% { opacity: .62; transform: scale(.94); } 50% { opacity: 1; transform: scale(1.08); } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>
  <circle cx="1000" cy="98" r="180" fill="url(#orb)"/>
  <circle cx="120" cy="360" r="230" fill="#22C55E" fill-opacity=".12"/>
  <path class="route" d="M76 322C238 170 392 356 554 220C716 84 888 232 1122 84" stroke="url(#accent)" stroke-width="3.4" opacity=".88" filter="url(#glow)"/>

  <g transform="translate(70 76)">
    <text class="name" x="0" y="62">Kavyansh Singh</text>
    <text class="role" x="4" y="106">Full Stack Developer | MERN Stack | DevOps Automation</text>
    <text class="body" x="4" y="148">Designing practical web products, dependable APIs, and deployment-ready systems.</text>
    <g transform="translate(4 184)">
      <rect width="154" height="38" rx="19" fill="#38BDF8" fill-opacity=".16" stroke="#38BDF8" stroke-opacity=".7"/>
      <text class="pill" x="27" y="25">WEB APPS</text>
      <rect x="172" width="148" height="38" rx="19" fill="#22C55E" fill-opacity=".16" stroke="#22C55E" stroke-opacity=".7"/>
      <text class="pill" x="204" y="25">APIS</text>
      <rect x="338" width="174" height="38" rx="19" fill="#F59E0B" fill-opacity=".16" stroke="#F59E0B" stroke-opacity=".7"/>
      <text class="pill" x="367" y="25">AUTOMATION</text>
    </g>
  </g>

  <g class="float" transform="translate(720 70)" filter="url(#shadow)">
    <rect width="390" height="245" rx="26" fill="#FFFFFF" fill-opacity=".105" stroke="#FFFFFF" stroke-opacity=".18"/>
    <circle cx="94" cy="88" r="48" fill="#38BDF8" fill-opacity=".18" stroke="#38BDF8" stroke-opacity=".65"/>
    <circle cx="198" cy="88" r="48" fill="#22C55E" fill-opacity=".18" stroke="#22C55E" stroke-opacity=".65"/>
    <circle cx="302" cy="88" r="48" fill="#F59E0B" fill-opacity=".18" stroke="#F59E0B" stroke-opacity=".65"/>
    <text class="label" x="62" y="94">BUILD</text>
    <text class="label" x="171" y="94">TEST</text>
    <text class="label" x="279" y="94">SHIP</text>
    <path d="M142 88H150M246 88H254" stroke="#D9F99D" stroke-width="3" stroke-linecap="round"/>
    <rect x="54" y="160" width="282" height="16" rx="8" fill="#FFFFFF" fill-opacity=".16"/>
    <rect class="pulse" x="54" y="160" width="188" height="16" rx="8" fill="url(#accent)"/>
    <text class="small" x="88" y="207">portfolio-quality projects with delivery mindset</text>
  </g>

  <g class="float2" transform="translate(738 318)" filter="url(#shadow)">
    <path d="M0 44L128 0L256 44L128 92Z" fill="#0A1A2B" stroke="#38BDF8" stroke-opacity=".5"/>
    <path d="M58 44L128 20L198 44L128 70Z" fill="#0E2A3D" stroke="#22C55E" stroke-opacity=".6"/>
    <circle class="pulse" cx="86" cy="44" r="6" fill="#38BDF8"/>
    <circle class="pulse" cx="128" cy="29" r="6" fill="#22C55E"/>
    <circle class="pulse" cx="170" cy="44" r="6" fill="#F59E0B"/>
  </g>
</svg>
