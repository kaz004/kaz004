<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kavyansh Singh developer profile banner</title>
  <desc id="desc">A professional developer banner with full stack, CI/CD, container, and deployment visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06101F"/>
      <stop offset="0.45" stop-color="#0E243E"/>
      <stop offset="1" stop-color="#062D2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="78" y1="314" x2="1088" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.055"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop stop-color="#38BDF8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
    <style>
      .name { font: 900 60px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .role { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #C9DAEE; }
      .body { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #9FB2C8; }
      .pill { font: 800 14px 'Segoe UI', Arial, sans-serif; fill: #F4F9FF; letter-spacing: .7px; }
      .mono { font: 800 17px 'Segoe UI', Arial, sans-serif; fill: #D9F99D; letter-spacing: .2px; }
      .tiny { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #BFD0E4; }
      .flow { stroke-dasharray: 10 14; animation: flow 18s linear infinite; }
      .float1 { animation: float1 7s ease-in-out infinite; }
      .float2 { animation: float2 8s ease-in-out infinite; }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      .scan { animation: scan 5s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset: -480; } }
      @keyframes float1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
      @keyframes float2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(12px); } }
      @keyframes pulse { 0%,100% { opacity: .5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
      @keyframes scan { 0%,100% { transform: translateY(0); opacity: .22; } 50% { transform: translateY(96px); opacity: .7; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <circle cx="964" cy="116" r="170" fill="url(#halo)"/>
  <circle cx="120" cy="360" r="210" fill="#22C55E" fill-opacity="0.13"/>
  <path class="flow" d="M84 316C228 198 354 344 510 214C666 84 826 240 1086 96" stroke="url(#accent)" stroke-width="3.2" filter="url(#glow)" opacity=".9"/>

  <g transform="translate(70 76)">
    <text class="name" x="0" y="62">Kavyansh Singh</text>
    <text class="role" x="4" y="104">Full Stack Developer | MERN Stack | DevOps Automation</text>
    <text class="body" x="4" y="146">Building practical web apps, APIs, pipelines, containers, and deployment-ready projects.</text>

    <g transform="translate(4 180)">
      <rect width="150" height="38" rx="19" fill="#38BDF8" fill-opacity=".16" stroke="#38BDF8" stroke-opacity=".65"/>
      <text class="pill" x="23" y="25">MERN STACK</text>
      <rect x="168" width="136" height="38" rx="19" fill="#22C55E" fill-opacity=".16" stroke="#22C55E" stroke-opacity=".65"/>
      <text class="pill" x="193" y="25">CI/CD</text>
      <rect x="322" width="170" height="38" rx="19" fill="#F59E0B" fill-opacity=".16" stroke="#F59E0B" stroke-opacity=".65"/>
      <text class="pill" x="346" y="25">DOCKER + K8S</text>
    </g>
  </g>

  <g class="float1" filter="url(#shadow)">
    <rect x="705" y="72" width="404" height="240" rx="22" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity=".18"/>
    <rect x="705" y="72" width="404" height="52" rx="22" fill="#FFFFFF" fill-opacity=".08"/>
    <circle cx="735" cy="99" r="6" fill="#F87171"/>
    <circle cx="759" cy="99" r="6" fill="#FBBF24"/>
    <circle cx="783" cy="99" r="6" fill="#34D399"/>
    <text class="tiny" x="815" y="104">developer workflow</text>
    <text class="mono" x="742" y="158">PLAN</text>
    <text class="mono" x="842" y="158">BUILD</text>
    <text class="mono" x="948" y="158">SHIP</text>
    <text class="mono" x="742" y="204">Full Stack Apps</text>
    <text class="mono" x="742" y="240">CI/CD Automation</text>
    <text class="mono" x="742" y="276">Cloud Ready Projects</text>
    <rect class="scan" x="724" y="142" width="366" height="30" rx="15" fill="#38BDF8" fill-opacity=".14"/>
  </g>

  <g class="float2" transform="translate(730 314)" filter="url(#shadow)">
    <path d="M0 48L120 0L240 48L120 96Z" fill="#0B182A" stroke="#38BDF8" stroke-opacity=".42"/>
    <path d="M48 48L120 18L192 48L120 78Z" fill="#0E243E" stroke="#22C55E" stroke-opacity=".54"/>
    <g class="pulse">
      <circle cx="72" cy="48" r="6" fill="#38BDF8"/>
      <circle cx="120" cy="30" r="6" fill="#22C55E"/>
      <circle cx="168" cy="48" r="6" fill="#F59E0B"/>
    </g>
    <text class="tiny" x="36" y="126">idea to deployment</text>
  </g>
</svg>
