      <rect class="cell d8" x="0" y="28" width="18" height="18" rx="5" fill="#BBF7D0"/><rect class="cell d6" x="26" y="28" width="18" height="18" rx="5" fill="#22C55E"/><rect class="cell d4" x="52" y="28" width="18" height="18" rx="5" fill="#14532D"/><rect class="cell d2" x="78" y="28" width="18" height="18" rx="5" fill="#86EFAC"/><rect class="cell d9" x="104" y="28" width="18" height="18" rx="5" fill="#15803D"/><rect class="cell d7" x="130" y="28" width="18" height="18" rx="5" fill="#22C55E"/><rect class="cell d5" x="156" y="28" width="18" height="18" rx="5" fill="#123524"/><rect class="cell d3" x="182" y="28" width="18" height="18" rx="5" fill="#16A34A"/>
